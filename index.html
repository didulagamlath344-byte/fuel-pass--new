<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Fuel Pro</title>
    <style>
        body { background: #000; color: #ffd700; font-family: sans-serif; text-align: center; padding: 50px; }
        #status { font-size: 12px; color: #555; margin-top: 20px; }
        .btn { background: #ffd700; padding: 15px; border-radius: 10px; width: 100%; border:none; font-weight:bold; }
    </style>
</head>
<body>
    <h1>FUEL PASS PRO</h1>
    <p id="msg">පද්ධතිය පරීක්ෂා කරමින්...</p>
    
    <div style="border: 1px solid #333; padding: 20px; border-radius: 15px;">
        <input type="text" id="v" placeholder="Vehicle No" style="width:90%; padding:10px; margin-bottom:10px;">
        <button class="btn" onclick="save()">SAVE DATA</button>
    </div>

    <div id="status">Checking PWA Status...</div>

    <script>
        // Service Worker ලියාපදිංචිය
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => { document.getElementById('status').innerText = "✅ Service Worker: Active"; })
            .catch(() => { document.getElementById('status').innerText = "❌ SW Error"; });
        }

        // Install වෙන්න පුළුවන්ද බලන එක
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            document.getElementById('msg').innerText = "🚀 ඇප් එක ඉන්ස්ටෝල් කිරීමට සූදානම්!";
            document.getElementById('msg').style.color = "#00ff88";
        });

        function save() {
            localStorage.setItem('no', document.getElementById('v').value);
            alert("Saved!");
        }
    </script>
</body>
</html>
